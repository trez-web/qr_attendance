<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance — Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }

        /* ── Slider ─────────────────────────────────────────────── */
        .slide {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1.2s ease-in-out;
        }
        .slide.active { opacity: 1; }

        /* ── Input ──────────────────────────────────────────────── */
        .field {
            width: 100%; padding: 0.75rem 1rem 0.75rem 2.75rem;
            border: 1.5px solid #e2e8f0; border-radius: 0.75rem;
            font-size: 0.9rem; color: #1e293b; background: #f8fafc;
            transition: all 0.25s; outline: none;
        }
        .field:focus {
            border-color: #3b82f6; background: #fff;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
        }
        .field::placeholder { color: #94a3b8; }

        /* ── Button ─────────────────────────────────────────────── */
        .btn-signin {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: #fff; font-weight: 600; font-size: 0.95rem;
            padding: 0.85rem; border-radius: 0.75rem; width: 100%;
            border: none; cursor: pointer; transition: all 0.3s;
            position: relative; overflow: hidden;
        }
        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(79,70,229,0.4);
        }
        .btn-signin:active { transform: translateY(0); }

        /* ── Fade-in animation ──────────────────────────────────── */
        .fade-up { animation: fadeUp 0.6s ease both; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Shake on error ─────────────────────────────────────── */
        .shake { animation: shake 0.4s ease; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%,75%  { transform: translateX(-7px); }
            50%      { transform: translateX(7px); }
        }

        /* ── Dot indicators ─────────────────────────────────────── */
        .dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.4); transition: all 0.3s; cursor:pointer; }
        .dot.active { background:#fff; width:24px; border-radius:4px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-5xl min-h-[600px] bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">

    <!-- ══════════════════════════════════════ LEFT — Image Slider -->
    <div class="relative hidden md:block md:w-[60%] overflow-hidden">

        <!-- Slides -->
        <div id="slide-0" class="slide active"
             style="background-image:url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=1200&q=80')"></div>
        <div id="slide-1" class="slide"
             style="background-image:url('https://images.unsplash.com/photo-1606761568499-6d2451b23c66?w=1200&q=80')"></div>
        <div id="slide-2" class="slide"
             style="background-image:url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=1200&q=80')"></div>
        <div id="slide-3" class="slide"
             style="background-image:url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200&q=80')"></div>

        <!-- Gradient overlay -->
        <div class="absolute inset-0 bg-gradient-to-br from-blue-900/80 via-blue-800/60 to-indigo-900/80"></div>

        <!-- Text overlay -->
        <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-10 z-10">
            <!-- QR icon -->
            <div class="w-16 h-16 rounded-2xl bg-white/15 backdrop-blur-sm flex items-center justify-center mb-6 border border-white/20">
                <svg class="w-9 h-9 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="5" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
                    <rect x="16" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
                    <rect x="5" y="16" width="3" height="3" fill="currentColor" stroke="none"/>
                    <path d="M14 14h3v3h-3zM17 17h3v3h-3zM14 17h3" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white leading-tight mb-3">
                Smart QR Attendance<br>System
            </h1>
            <p class="text-blue-200 text-base font-medium tracking-widest uppercase">
                Fast &nbsp;·&nbsp; Secure &nbsp;·&nbsp; Reliable
            </p>

            <!-- Slide caption -->
            <p id="slide-caption" class="text-white/70 text-sm mt-6 italic transition-opacity duration-500"></p>
        </div>

        <!-- Dot indicators -->
        <div class="absolute bottom-6 left-0 right-0 flex justify-center gap-2 z-10">
            <div class="dot active" onclick="goTo(0)"></div>
            <div class="dot" onclick="goTo(1)"></div>
            <div class="dot" onclick="goTo(2)"></div>
            <div class="dot" onclick="goTo(3)"></div>
        </div>
    </div>

    <!-- ══════════════════════════════════════ RIGHT — Login Form -->
    <div class="flex-1 flex flex-col items-center justify-center px-8 py-12 md:px-12 bg-white">

        <div class="w-full max-w-sm fade-up">

            <!-- Logo + title -->
            <div class="text-center mb-8">
                <div class="w-14 h-14 rounded-2xl bg-blue-600 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                    <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="5" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
                        <rect x="16" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
                        <rect x="5" y="16" width="3" height="3" fill="currentColor" stroke="none"/>
                        <path d="M14 14h3v3h-3zM17 17h3v3h-3zM14 17h3" stroke-linecap="round"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Welcome Back</h2>
                <p class="text-slate-500 text-sm mt-1">Sign in to QR Attendance System</p>
            </div>

            <!-- Error -->
            {% if error %}
            <div class="shake bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-xl mb-5 flex items-center gap-2">
                <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <!-- Form -->
            <form method="post" id="login-form" class="space-y-4">
                {% csrf_token %}

                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/>
                            </svg>
                        </span>
                        <input type="text" name="username" id="username"
                               placeholder="Enter your username"
                               class="field" required autofocus autocomplete="username">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <rect x="3" y="11" width="18" height="11" rx="2"/>
                                <path d="M7 11V7a5 5 0 0110 0v4"/>
                            </svg>
                        </span>
                        <input type="password" name="password" id="password"
                               placeholder="Enter your password"
                               class="field pr-10" required autocomplete="current-password">
                        <button type="button" id="toggle-pw"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition">
                            <svg id="eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" id="submit-btn" class="btn-signin mt-2">
                    <span id="btn-text">Sign In</span>
                    <span id="btn-spinner" class="hidden items-center justify-center gap-2">
                        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                        </svg>
                        Signing in…
                    </span>
                </button>
            </form>

            <!-- Footer note -->
            <p class="text-center text-xs text-slate-400 mt-8">
                QR Attendance System &copy; 2025 &nbsp;·&nbsp; Eng Kweka
            </p>
        </div>
    </div>

</div>

<script>
    // ── Slider ────────────────────────────────────────────────────
    const captions = [
        "Modern classroom attendance tracking",
        "Secure digital check-in for every session",
        "Technology-powered education management",
        "Real-time attendance, anywhere"
    ];
    const total = 4;
    let current = 0, timer;

    function goTo(n) {
        document.getElementById('slide-' + current).classList.remove('active');
        document.querySelectorAll('.dot')[current].classList.remove('active');
        current = n;
        document.getElementById('slide-' + current).classList.add('active');
        document.querySelectorAll('.dot')[current].classList.add('active');
        document.getElementById('slide-caption').textContent = captions[current];
        clearInterval(timer);
        timer = setInterval(() => goTo((current + 1) % total), 5000);
    }

    document.getElementById('slide-caption').textContent = captions[0];
    timer = setInterval(() => goTo((current + 1) % total), 5000);

    // ── Password toggle ───────────────────────────────────────────
    document.getElementById('toggle-pw').addEventListener('click', function () {
        const pw = document.getElementById('password');
        const icon = document.getElementById('eye-icon');
        if (pw.type === 'password') {
            pw.type = 'text';
            icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
        } else {
            pw.type = 'password';
            icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
    });

    // ── Loading state ─────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', function () {
        document.getElementById('btn-text').classList.add('hidden');
        const spinner = document.getElementById('btn-spinner');
        spinner.classList.remove('hidden');
        spinner.classList.add('flex');
        document.getElementById('submit-btn').disabled = true;
    });
</script>
</body>
</html>
