{% extends 'attendance/base.html' %}
{% block content %}

<div class="max-w-md mx-auto text-center">
    <div class="glass-card rounded-2xl p-10">
        <svg class="w-16 h-16 text-red-400 mx-auto mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4M12 16h.01"/>
        </svg>
        <h1 class="text-2xl font-bold text-white mb-2">Unauthorized</h1>
        <p class="text-slate-400 text-sm mb-6">You are not assigned to manage this meeting. Please contact the admin.</p>
        <a href="{% url 'meeting_list' %}"
           class="btn-primary text-white font-semibold px-6 py-2.5 rounded-xl text-sm inline-block">
            ← Back to Meetings
        </a>
    </div>
</div>

{% endblock %}
